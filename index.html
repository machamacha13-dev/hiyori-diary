<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ひよりの連絡帳">
<meta name="theme-color" content="#f8b4b4">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ひよりちゃんの連絡帳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Zen Maru Gothic', 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
  background: #fef6e4;
  color: #5c4a3a;
  min-height: 100vh;
}

/* ======== Lock Screen ======== */
.lock-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(160deg, #fef6e4 0%, #fce9d8 50%, #f8e0d0 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s, transform 0.5s;
}

.lock-screen.unlocked {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

.lock-box {
  text-align: center;
  padding: 40px 32px;
  max-width: 360px;
  width: 100%;
}

.lock-icon {
  font-size: 80px;
  margin-bottom: 12px;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.lock-title {
  font-size: 22px;
  font-weight: 700;
  color: #6b4226;
  margin-bottom: 4px;
}

.lock-subtitle {
  font-size: 13px;
  color: #a08468;
  margin-bottom: 28px;
}

.lock-input-wrap {
  display: flex;
  align-items: center;
  background: #fff;
  border: 2px solid #f0d8c0;
  border-radius: 16px;
  padding: 10px 16px;
  box-shadow: 0 4px 15px rgba(200,150,100,0.12);
  transition: border-color 0.3s;
}

.lock-input-wrap:focus-within {
  border-color: #f8b4b4;
}

.lock-input-wrap.error {
  border-color: #e88;
  animation: shake 0.4s;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

.lock-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 16px;
  font-family: inherit;
  color: #5c4a3a;
  background: transparent;
  -webkit-text-security: disc;
}

.lock-input::placeholder { color: #c9a88a; }

.lock-submit {
  background: linear-gradient(135deg, #f8b4b4, #f9d4a8);
  border: none;
  border-radius: 12px;
  padding: 10px 20px;
  font-size: 15px;
  font-family: inherit;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 16px;
  width: 100%;
  box-shadow: 0 4px 12px rgba(200,140,100,0.25);
  transition: transform 0.15s;
}

.lock-submit:active { transform: scale(0.97); }

.lock-error {
  color: #d66;
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
}

/* ======== Main App (hidden until unlocked) ======== */
.app { display: none; }
.app.show { display: block; }

/* ---- Header ---- */
.header {
  background: linear-gradient(135deg, #f8b4b4 0%, #f9d4a8 50%, #fce9b0 100%);
  padding: 24px 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(200,150,100,0.15);
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
  color: #6b4226;
  letter-spacing: 2px;
}

.header h1 .emoji { font-size: 26px; }

.header .subtitle {
  font-size: 12px;
  color: #8b6a50;
  margin-top: 4px;
  font-weight: 400;
}

/* ---- Search & Filter ---- */
.controls {
  padding: 16px;
  max-width: 640px;
  margin: 0 auto;
}

.search-box {
  display: flex;
  align-items: center;
  background: #fff;
  border: 2px solid #f0d8c0;
  border-radius: 24px;
  padding: 8px 16px;
  box-shadow: 0 2px 8px rgba(200,150,100,0.1);
}

.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: #5c4a3a;
  background: transparent;
}

.search-box input::placeholder { color: #c9a88a; }
.search-icon { font-size: 18px; margin-right: 8px; color: #d4a574; }

.filter-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.filter-btn {
  font-family: inherit;
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 2px solid #f0d8c0;
  background: #fff;
  color: #8b6a50;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover, .filter-btn.active {
  background: #f8b4b4;
  border-color: #f8b4b4;
  color: #fff;
}

.stats {
  text-align: center;
  font-size: 13px;
  color: #b08a6a;
  margin-top: 12px;
}

/* ---- Timeline ---- */
.timeline {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

.month-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0 16px;
}

.month-divider .line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, #e0c8a8, transparent);
}

.month-divider .label {
  font-size: 14px;
  font-weight: 700;
  color: #c49060;
  white-space: nowrap;
  padding: 4px 16px;
  background: #fef0d8;
  border-radius: 20px;
  border: 1px solid #e8d4b8;
}

/* ---- Entry Card ---- */
.entry-card {
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 3px 15px rgba(180,140,100,0.1);
  border: 1px solid #f0e4d4;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
}

.entry-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(180,140,100,0.18);
}

.entry-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 5px;
  height: 100%;
  background: linear-gradient(180deg, #f8b4b4, #fce9b0);
  border-radius: 20px 0 0 20px;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.card-date {
  font-size: 13px;
  font-weight: 700;
  color: #d4856a;
  background: #fef0e8;
  padding: 4px 12px;
  border-radius: 12px;
}

.card-day { font-size: 12px; color: #b09878; }

.card-teacher {
  font-size: 12px;
  color: #a08468;
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-body {
  font-size: 14.5px;
  line-height: 1.85;
  color: #5c4a3a;
  white-space: pre-wrap;
}

.card-body.collapsed {
  max-height: 120px;
  overflow: hidden;
  position: relative;
}

.card-body.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50px;
  background: linear-gradient(transparent, #fff);
}

.read-more {
  display: inline-block;
  margin-top: 8px;
  font-size: 13px;
  color: #e08a70;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  border: none;
  background: none;
}

/* ---- Detail info ---- */
.card-detail {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px dashed #e8d8c8;
  display: none;
}
.card-detail.show { display: block; }

.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.detail-item {
  background: #fef8f0;
  border-radius: 12px;
  padding: 10px 12px;
  text-align: center;
}

.detail-item .label { font-size: 11px; color: #b09878; margin-bottom: 4px; }
.detail-item .value { font-size: 14px; font-weight: 500; color: #6b4a2e; }

/* ---- Modal ---- */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(80,50,30,0.4);
  z-index: 200;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 16px;
  overflow-y: auto;
}
.modal-overlay.show { display: flex; }

.modal {
  background: #fff;
  border-radius: 24px;
  max-width: 600px;
  width: 100%;
  padding: 28px 24px;
  box-shadow: 0 10px 40px rgba(100,60,30,0.2);
  animation: slideUp 0.3s ease-out;
  position: relative;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-close {
  position: absolute;
  top: 16px; right: 20px;
  font-size: 24px;
  color: #c0a888;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
}

.modal .card-date { font-size: 16px; }
.modal .card-body { font-size: 15px; }

/* ---- Scroll to top ---- */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f8b4b4, #f9d4a8);
  color: #fff;
  border: none;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(200,140,100,0.3);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.scroll-top.show { display: flex; }

/* ---- Responsive ---- */
@media (max-width: 480px) {
  .header h1 { font-size: 18px; }
  .entry-card { padding: 16px; }
  .card-body { font-size: 14px; }
}
</style>
</head>
<body>

<!-- ======== Password Lock Screen ======== -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">&#x1F43B;</div>
    <div class="lock-title">ひよりちゃんの連絡帳</div>
    <div class="lock-subtitle">パスワードを入力してください</div>
    <form id="lockForm" onsubmit="return tryUnlock(event)">
      <div class="lock-input-wrap" id="lockInputWrap">
        <input type="password" class="lock-input" id="lockInput" placeholder="パスワード" autocomplete="off">
      </div>
      <button type="submit" class="lock-submit">ひらく</button>
    </form>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<!-- ======== Main App ======== -->
<div class="app" id="app">

  <div class="header">
    <h1><span class="emoji">&#x1F43B;</span> ひよりちゃんの連絡帳 <span class="emoji">&#x1F338;</span></h1>
    <div class="subtitle">みちる愛児園中里ナーサリー</div>
  </div>

  <div class="controls">
    <div class="search-box">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="searchInput" placeholder="キーワードで検索...">
    </div>
    <div class="filter-row" id="yearFilter"></div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="timeline" id="timeline"></div>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#x2191;</button>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>
</div>

<script>
// ======== Password Protection ========
// Hash the password for comparison (not stored in plain text in source)
async function hashPassword(pw) {
  const data = new TextEncoder().encode(pw);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const PASS_HASH = '95e1f73250ff0de3a2b89tried';  // placeholder, will be set below

let correctHash = '';

// Compute the hash on load
(async () => {
  // The correct password hash (SHA-256 of "hiyori2364")
  correctHash = await hashPassword('hiyori2364');
})();

async function tryUnlock(e) {
  e.preventDefault();
  const input = document.getElementById('lockInput').value;
  const inputHash = await hashPassword(input);

  if (inputHash === correctHash) {
    // Save session
    sessionStorage.setItem('unlocked', '1');
    document.getElementById('lockScreen').classList.add('unlocked');
    setTimeout(() => {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('app').classList.add('show');
      loadApp();
    }, 500);
  } else {
    document.getElementById('lockInputWrap').classList.add('error');
    document.getElementById('lockError').textContent = 'パスワードが違います';
    setTimeout(() => {
      document.getElementById('lockInputWrap').classList.remove('error');
    }, 500);
  }
  return false;
}

// Check if already unlocked in this session
if (sessionStorage.getItem('unlocked') === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  // defer load to after DOM
  setTimeout(loadApp, 0);
}

// ======== Main App ========
let entries = [];

function loadApp() {
  fetch('entries.json')
    .then(r => r.json())
    .then(data => {
      entries = data;
      init();
    })
    .catch(() => {
      document.getElementById('timeline').innerHTML =
        '<p style="text-align:center;padding:40px;color:#b08a6a;">データを読み込めませんでした</p>';
    });
}

function init() {
  buildYearFilter();
  renderEntries();
  setupSearch();
  setupScroll();
}

function parseEntry(entry) {
  const body = entry.body || '';
  const lines = body.split('\n');
  let mainText = [], meal = '', mood_am = '', mood_pm = '', nap = '', poop = '', teacher = '';
  let section = 'main';

  for (const line of lines) {
    const l = line.trim();
    if (l.startsWith('園からの連絡帳')) continue;
    if (l === entry.title) continue;
    if (l.startsWith('To:') || l.startsWith('確認済') || l.match(/^\d{4}年/)) continue;

    if (l === '食事') { section = 'meal'; continue; }
    if (l === '機嫌') { section = 'mood'; continue; }
    if (l === '午睡') { section = 'nap'; continue; }
    if (l === '排便') { section = 'poop'; continue; }

    if (section === 'meal') { meal = l; section = 'main'; continue; }
    if (section === 'mood') {
      if (l.startsWith('午前')) mood_am = l.replace('午前：', '');
      else if (l.startsWith('午後')) { mood_pm = l.replace('午後：', ''); section = 'main'; }
      continue;
    }
    if (section === 'nap') { nap = l; section = 'main'; continue; }
    if (section === 'poop') { poop = l; section = 'main'; continue; }
    if (section === 'main' && l) mainText.push(l);
  }

  const teacherMatch = entry.title.match(/：(.+?)より$/);
  teacher = teacherMatch ? teacherMatch[1] : '';

  const dateMatch = entry.date.match(/(\d{4})-(\d{2})-(\d{2})/);
  let year = '', month = '', day = '', dayOfWeek = '';
  if (dateMatch) {
    year = dateMatch[1];
    month = parseInt(dateMatch[2]);
    day = parseInt(dateMatch[3]);
    const d = new Date(parseInt(year), month - 1, day);
    dayOfWeek = ['日','月','火','水','木','金','土'][d.getDay()];
  }

  return { ...entry, mainText: mainText.join('\n'), meal, mood_am, mood_pm, nap, poop, teacher, year, month, day, dayOfWeek };
}

function buildYearFilter() {
  const years = [...new Set(entries.map(e => e.date.substring(0, 4)))].sort();
  const container = document.getElementById('yearFilter');
  container.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'すべて';
  allBtn.onclick = () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); allBtn.classList.add('active'); renderEntries(); };
  container.appendChild(allBtn);

  years.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = y + '年';
    btn.dataset.year = y;
    btn.onclick = () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderEntries(y); };
    container.appendChild(btn);
  });
}

function renderEntries(yearFilter, searchText) {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  let filtered = entries.map(parseEntry);
  if (yearFilter) filtered = filtered.filter(e => e.year === yearFilter);
  if (searchText) { const q = searchText.toLowerCase(); filtered = filtered.filter(e => (e.mainText + e.title + e.teacher).toLowerCase().includes(q)); }
  filtered.sort((a, b) => a.date.localeCompare(b.date));
  document.getElementById('stats').textContent = filtered.length + ' 件の連絡帳';

  let currentMonth = '';
  filtered.forEach((entry, idx) => {
    const monthKey = entry.year + '-' + String(entry.month).padStart(2, '0');
    if (monthKey !== currentMonth) {
      currentMonth = monthKey;
      const divider = document.createElement('div');
      divider.className = 'month-divider';
      divider.innerHTML = `<div class="line"></div><div class="label">${entry.year}年${entry.month}月</div><div class="line"></div>`;
      timeline.appendChild(divider);
    }

    const card = document.createElement('div');
    card.className = 'entry-card';
    const bodyPreview = entry.mainText.length > 150 ? entry.mainText.substring(0, 150) + '...' : entry.mainText;

    card.innerHTML = `
      <div class="card-header">
        <span class="card-date">${entry.month}/${entry.day}</span>
        <span class="card-day">(${entry.dayOfWeek})</span>
        ${entry.teacher ? `<span class="card-teacher">&#x270D;&#xFE0F; ${entry.teacher}</span>` : ''}
      </div>
      <div class="card-body collapsed">${bodyPreview}</div>
      <button class="read-more" onclick="event.stopPropagation(); openModal(${idx})">もっと読む &raquo;</button>
    `;
    card.onclick = () => openModal(idx);
    timeline.appendChild(card);
  });
  window._filteredEntries = filtered;
}

function openModal(idx) {
  const entry = window._filteredEntries[idx];
  if (!entry) return;

  const details = [];
  if (entry.meal) details.push({ icon: '&#x1F37D;', label: '食事', value: entry.meal });
  if (entry.mood_am) details.push({ icon: '&#x1F60A;', label: '午前', value: entry.mood_am });
  if (entry.mood_pm) details.push({ icon: '&#x1F60A;', label: '午後', value: entry.mood_pm });
  if (entry.nap) details.push({ icon: '&#x1F4A4;', label: '午睡', value: entry.nap });
  if (entry.poop) details.push({ icon: '&#x1F6BD;', label: '排便', value: entry.poop });

  const detailHTML = details.length ? `
    <div class="card-detail show"><div class="detail-grid">
      ${details.map(d => `<div class="detail-item"><div class="label">${d.icon} ${d.label}</div><div class="value">${d.value}</div></div>`).join('')}
    </div></div>` : '';

  document.getElementById('modalContent').innerHTML = `
    <div class="card-header" style="margin-bottom:16px;">
      <span class="card-date">${entry.year}年${entry.month}月${entry.day}日</span>
      <span class="card-day">(${entry.dayOfWeek})</span>
      ${entry.teacher ? `<span class="card-teacher">&#x270D;&#xFE0F; ${entry.teacher}</span>` : ''}
    </div>
    <div class="card-body" style="font-size:15px; line-height:2;">${entry.mainText}</div>
    ${detailHTML}
  `;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(); });

function setupSearch() {
  let timer;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      const activeYear = document.querySelector('.filter-btn.active');
      const year = activeYear?.dataset?.year || null;
      renderEntries(year, e.target.value);
    }, 300);
  });
}

function setupScroll() {
  window.addEventListener('scroll', () => {
    document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
  });
}

// ======== PWA Service Worker ========
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
